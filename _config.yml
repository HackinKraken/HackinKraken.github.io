markdown: kramdown

url: "https://hackinkraken.com"
baseurl: ""

title: HackinKraken
description: Security research, CVE write-ups, and blogs by Steven Amador
site-image: /assets/images/meta.jpg
site-keywords: security research, CVE, penetration testing, bug bounty, vulnerability disclosure
favicon-url: /assets/images/icon.png
heroimage: https://images.pexels.com/photos/220444/pexels-photo-220444.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940

email:
facebook_username:
twitter_username: HackinKraken
instagram_username:
linkedin_username: steven-amador
github_username: HackinKraken
youtube_channel_id: UC7FMEh4xa7ljHu-FNHUKEUg
reddit_username:
behance_username:
dribbble_username:
spotify_username:

google-analytics:
disqus-shortname:

author-name: Steven Amador
author-image: /assets/images/pfp.jpg
author-about: 'Senior Cloud Security Engineer by day, Web Application Security Tester by day and night!<br><br>Read my blog posts where I share thoughts, CVE write ups, and some creative writing (may or not be tech related, I'm not a very a good writer!). I am listing my CVEs on <a href="https://github.com/HackinKraken/Security-Research-and-CVE" target="_blank" style="padding: 0; margin: 0; display: inline;">my GitHub</a> for better SEO — CVE-2022-2650, CVE-2026-39338. It also serves as a quick single pane for reference that is better than clicking around different blog posts.'
author-url: https://github.com/HackinKraken

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

permalink: "blog/:title"

compress_html:
  clippings: all

defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
