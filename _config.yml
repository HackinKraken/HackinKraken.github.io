markdown: kramdown

url: "https://hackinkraken.com"
baseurl: ""

title: HackinKraken
description: Security research, CVE write-ups, and pentesting notes by Steven Amador
site-image: /assets/images/meta.jpg
site-keywords: security research, CVE, penetration testing, bug bounty, vulnerability disclosure
favicon-url:
heroimage: https://images.pexels.com/photos/220444/pexels-photo-220444.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940

email:
facebook_username:
twitter_username:
instagram_username:
linkedin_username: steven-amador
github_username: HackinKraken
youtube_channel_id:
reddit_username:
behance_username:
dribbble_username:
spotify_username:

google-analytics:
disqus-shortname:

author-name: Steven Amador
author-image: https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png
author-about: Web application security tester and security researcher. Alias HackinKraken — CVE-2022-2650, CVE-2026-39338.
author-url: https://github.com/HackinKraken

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

permalink: "blog/:title"

compress_html:
  clippings: all

defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
